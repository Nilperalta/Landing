<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre Checkout</title>
    <link rel="stylesheet" href="preCheckout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="checkout-header">
        <div class="checkout-header__logo">
            <img src="images/Ellipse 3.png" alt="Mango">
            <span>Mango</span>
        </div>
        <a class="checkout-header__volver">Volver</a>
    </header>

    <!-- Resumen -->
    <section class="checkout-resumen">
        <div class="checkout-resumen__header">
            <h2>Resumen</h2>
            <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="checkout-resumen__detalle">
            <img src="images/image_p.png" alt="Camisa bootcut">
            <div class="checkout-resumen__info">
                <p class="resumen-nombre">Camisa <br> Bootcut</p>

                <div class="checkout-resumen__atributos">
                    <span>Color: <span class="resumen-color">Celeste</span></span>
                    <span>Talla: <span class="resumen-talla">M</span></span>
                    <span>Cantidad: <span class="resumen-cantidad">01</span></span>
                </div>
            </div>
        </div>

        <div class="checkout-resumen__total">
            <span>Total</span>
            <span class="total-price">S/ 120.00</span>
        </div>
    </section>

    <!-- Datos comprador -->
    <section class="checkout-datos">
        
        <h2>Datos comprador</h2>

        <div class="checkout-column">

            <div class="checkout-field">
                <label>Nombre</label>
                <div class="input-wrapper">
                    <input type="text" id="input-nombre" placeholder="Agregar">
                    <i class="fa-solid fa-circle-exclamation input-icon-error"></i>
                </div>
                <span class="field-error" id="error-nombre"></span>
            </div>

            <div class="checkout-field">
                <label>Celular</label>
                <div class="input-wrapper">
                    <div class="input-celular-wrapper">
                        <span class="celular-prefix">+51</span>
                        <input type="text" id="input-celular" placeholder="999 999 999" maxlength="9">
                    </div>
                        <i class="fa-solid fa-circle-exclamation input-icon-error"></i>
                </div>
                 <span class="field-error" id="error-celular"></span>
            </div>

            <div class="checkout-field">
                <label>Mail</label>

                <div class="input-wrapper">
                    <input type="email" id="input-mail" placeholder="Agregar">
                    <i class="fa-solid fa-circle-exclamation input-icon-error"></i>
                </div>

                <span class="field-error" id="error-mail"></span>
            </div>
        </div>

    </section>

    <!-- Entrega -->
    <section class="checkout-entrega">
        <div class="checkout-entrega__header">
            <h2>Entrega</h2>
            <i class="fa-solid fa-chevron-down"></i>
        </div>

        <div class="checkout-entrega__content">

            <div class="checkout-entrega__opciones">
                <label>
                    <input type="radio" name="entrega" value="delivery" checked> Delivery
                </label>
                <label>
                    <input type="radio" name="entrega" value="recojo"> Recojo
                </label>
            </div>

            <div class="checkout-entrega__fields">
                <div class="checkout-field">
                    <label>Departamento</label>
                    <select id="input-departamento">
                        <option value="">Seleccionar</option>
                        <option value="lima">Lima</option>
                        <option value="arequipa">Arequipa</option>
                        <option value="cusco">Cusco</option>
                        <option value="piura">Piura</option>
                        <option value="trujillo">Trujillo</option>
                    </select>
                </div>

                <div class="checkout-field">
                    <label>Distrito</label>
                    <input type="text" id="input-distrito" placeholder="Surco">
                </div>

                <div class="checkout-field">
                    <label>Dirección</label>
                    <input type="text" id="input-direccion" placeholder="Av. Alfredo Benavides 778">
                </div>
            </div>

        </div>

    </section>

  </div>

  <!-- Footer fijo -->
  <div class="checkout-footer">
        <div class="checkout-footer__alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <p>Completa tus datos para continuar</p>
        </div>
        <div class="checkout-footer__btn">
            <button id="btn-pagar">Ir a pagar</button>
        </div>
  </div>



    <script src="preCheckout.js"></script>
</body>
</html>
